<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Centerpost -->
  <rect x="30" y="14" width="4" height="40" rx="1.5" fill="#fbbf24"/>
  <!-- Top finial -->
  <circle cx="32" cy="13" r="3.5" fill="#fbbf24"/>
  <!-- Base -->
  <rect x="20" y="52" width="24" height="4" rx="1.5" fill="#fbbf24"/>
  <rect x="24" y="56" width="16" height="3" rx="1" fill="#fbbf24"/>
  <!-- Crossbeam -->
  <rect x="10" y="20" width="44" height="3" rx="1.5" fill="#fbbf24"/>
  <!-- Left pan suspension -->
  <line x1="12" y1="24" x2="12" y2="34" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right pan suspension -->
  <line x1="52" y1="24" x2="52" y2="34" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left pan (slightly lower — heavier verdict) -->
  <path d="M5 36 Q12 44 19 36 Z" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right pan -->
  <path d="M45 36 Q52 44 59 36 Z" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
