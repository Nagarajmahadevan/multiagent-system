# =============================================================================
# MULTI-AGENT DEBATE SYSTEM — MASTER CONFIGURATION
# =============================================================================
# 10-agent pipeline: Explore → Debate → Compress → Resolve → Validate
# =============================================================================


# =============================================================================
# API KEYS
# =============================================================================

api_keys:
  deepseek: "DEEPSEEK_API_KEY"
  gemini: "GEMINI_API_KEY"
  openai: "OPENAI_API_KEY"
  anthropic: "ANTHROPIC_API_KEY"


# =============================================================================
# API BASE URLS
# =============================================================================

api_base_urls:
  deepseek: "https://api.deepseek.com"
  gemini: "https://generativelanguage.googleapis.com/v1beta"
  openai: "https://api.openai.com/v1"
  anthropic: "https://api.anthropic.com/v1"


# =============================================================================
# MODEL ASSIGNMENTS (10 agents)
# =============================================================================

agents:

  # --- LAYER 1: EXPLORATION ---
  visionary:
    model: "deepseek-chat"
    provider: "deepseek"

  researcher:
    model: "gemini-2.5-flash"
    provider: "gemini"

  # --- LAYER 2: DEBATE ---
  critic:
    model: "deepseek-chat"
    provider: "deepseek"

  defender:
    model: "gpt-4o-mini"
    provider: "openai"

  devils_advocate:
    model: "gemini-2.5-flash"
    provider: "gemini"

  # --- LAYER 2.5: COMPRESSION ---
  context_distiller:
    model: "deepseek-chat"
    provider: "deepseek"

  # --- LAYER 3: RESOLUTION ---
  mediator:
    model: "claude-sonnet-4-6"
    provider: "anthropic"

  architect:
    model: "claude-sonnet-4-6"
    provider: "anthropic"

  # --- LAYER 4: VALIDATION ---
  validator:
    model: "gpt-4o"
    provider: "openai"

  summarizer:
    model: "deepseek-chat"
    provider: "deepseek"


# =============================================================================
# TOKEN LIMITS
# =============================================================================

token_limits:
  visionary: 1500
  researcher: 2000
  critic: 1500
  defender: 1500
  devils_advocate: 2000
  context_distiller: 1500
  mediator: 1500
  architect: 2000
  validator: 2000
  summarizer: 1500


# =============================================================================
# PRICING (INR per 1 million tokens)
# =============================================================================

pricing:
  deepseek-chat:
    input_per_million: 23
    output_per_million: 35

  deepseek-reasoner:
    input_per_million: 46
    output_per_million: 184

  gemini-2.5-flash:
    input_per_million: 25
    output_per_million: 210

  gpt-4o-mini:
    input_per_million: 21
    output_per_million: 168

  gpt-4o:
    input_per_million: 208
    output_per_million: 835

  claude-sonnet-4-6:
    input_per_million: 253
    output_per_million: 1265


# =============================================================================
# PIPELINE SETTINGS
# =============================================================================

pipeline:
  max_retries: 1
  retry_delay_seconds: 3
  continue_on_failure: true
  output_filename: "final_output"
  output_folder: "output"


# =============================================================================
# CACHING SETTINGS
# =============================================================================

caching:
  deepseek: true
  gemini: false
  openai: false
  anthropic: false
